<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <!-- Header -->
    <header
      class="d-flex bg-light border-bottom py-3 px-4 align-items-center justify-content-between"
    >
      <div id="logo">
        <a href="#">
          <img
            src="https://cdn.sonicadigital.com.br/entra21/storage/settings/1/original-691cbe5cd50d1.png"
            alt="Logo"
            height="50"
          />
        </a>
      </div>
      <div id="usuario">
        <div class="d-none d-sm-flex">
          <span>Luiz Felipe Silveira</span>
          <button
            type="button"
            class="btn btn-link dropdown-toggle dropdown-toggle-split"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <span class="visually-hidden">Toggle Dropdown</span>
          </button>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Sair</a></li>
          </ul>
        </div>
        <div class="d-sm-none">
          <a
            class="btn btn-outline-primary"
            data-bs-toggle="offcanvas"
            href="#offcanvas-nav"
          >
            <i class="bi bi-list"></i>
          </a>
        </div>
      </div>
    </header>

    <style>
      @media screen and (min-width: 768px) {
        .main-menu {
          width: 280px;
        }
      }
    </style>

    <!-- Menu -->
    <div class="d-flex">
      <div
        class="offcanvas-md offcanvas-start bg-darkv vh-100 bg-dark"
        id="offcanvas-nav"
      >
        <div class="offcanvas-header">
          <h5 class="offcanvas-title text-white" id="staticBackdropLabel">
            Menu Principal
          </h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="offcanvas"
            data-bs-target="#offcanvas-nav"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body">
          <nav class="p-sm-3 text-white main-menu">
            <ul class="nav nav-pills d-flex flex-column">
              <li class="nav-item">
                <a href="admin.html" class="nav-link active">
                  <i class="bi bi-house-door me-2"></i>
                  <span>Página Inicial</span>
                </a>
              </li>

              <li>
                <a href="lista_usuario.html" class="nav-link text-white">
                  <i class="bi bi-people-fill me-2"></i>
                  <span>Lista de Usuários</span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>

      <!-- Main -->
      <main class="p-4 w-100" layout:fragment="content"></main>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
